<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einkaufsliste</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-white">
  <div class="mx-auto flex min-h-screen w-full max-w-2xl items-start justify-center px-4 py-6 sm:px-6 lg:px-8">
    <div class="w-full">
      <div class="overflow-hidden rounded-3xl border border-white/10 bg-white/10 shadow-2xl backdrop-blur-xl">

        <!-- Header -->
        <div class="border-b border-white/10 px-5 py-6 sm:px-8">
          <div class="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between">
            <div class="min-w-0">
              <p class="mb-2 inline-block rounded-full border border-emerald-400/20 bg-emerald-400/10 px-3 py-1 text-xs font-medium tracking-wide text-emerald-300">
                Gemeinsam organisiert
              </p>

              <h1 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
                Einkaufsliste
              </h1>

              <p class="mt-2 max-w-md text-sm leading-relaxed text-slate-300 sm:text-base">
                Schnell eintragen, bearbeiten und geräteübergreifend aktuell halten.
              </p>
            </div>

            <!-- Auth Bereich -->
            <div class="flex w-full flex-col gap-2 sm:w-auto sm:shrink-0 sm:items-end">
              <button
                id="loginButton"
                type="button"
                class="inline-flex w-full items-center justify-center rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-200 sm:w-auto sm:py-2"
              >
                Mit Google anmelden
              </button>

              <button
                id="logoutButton"
                type="button"
                class="hidden w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-sm font-semibold text-white transition hover:bg-white/20 sm:w-auto sm:py-2"
              >
                Abmelden
              </button>

              <p id="userInfo" class="w-full truncate text-left text-xs text-slate-300 sm:max-w-[190px] sm:text-right">
                Nicht angemeldet
              </p>
            </div>
          </div>
        </div>

        <!-- Login Hinweis -->
        <div id="loginNotice" class="border-b border-white/10 px-5 py-4 text-sm leading-relaxed text-slate-300 sm:px-8">
          Bitte melde dich mit Google an, um die Einkaufsliste zu nutzen.
        </div>

        <!-- List -->
        <div class="px-5 py-5 sm:px-8">
          <div id="entryList" class="space-y-3">
            <div class="rounded-2xl border border-dashed border-white/15 bg-white/5 px-4 py-8 text-center text-sm text-slate-300">
              Noch keine Einträge vorhanden.
            </div>
          </div>
        </div>

        <!-- Form -->
        <div class="border-t border-white/10 bg-black/10 px-5 py-5 sm:px-8">
          <form id="gratitudeForm" class="hidden space-y-4">
            <div>
              <label for="gratitude" class="mb-2 block text-sm font-medium text-slate-200">
                Was brauchen wir?
              </label>

              <input
                type="text"
                id="gratitude"
                placeholder="z. B. Hafermilch, Tomaten, Reis ..."
                required
                class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-white placeholder:text-slate-400 outline-none transition focus:border-emerald-400/50 focus:bg-white/15 focus:ring-4 focus:ring-emerald-400/10"
              />
            </div>

            <button
              type="submit"
              class="inline-flex w-full items-center justify-center rounded-2xl bg-emerald-500 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-emerald-900/30 transition hover:bg-emerald-400 active:scale-[0.99] sm:text-base"
            >
              Hinzufügen
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

    import {
      getDatabase,
      ref,
      push,
      onValue,
      remove,
      update
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWzDVcfiMG64EQxxSrHu1ORp0zwDbUYdQ",
      authDomain: "einkaufsliste-1c079.firebaseapp.com",
      databaseURL: "https://einkaufsliste-1c079-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "einkaufsliste-1c079",
      storageBucket: "einkaufsliste-1c079.firebasestorage.app",
      messagingSenderId: "23304432903",
      appId: "1:23304432903:web:4f9ab844cc034b94b169a2"
    };

    const app = initializeApp(firebaseConfig);

    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const entriesRef = ref(db, "entries");

    const entryList = document.getElementById("entryList");
    const gratitudeForm = document.getElementById("gratitudeForm");
    const gratitudeInput = document.getElementById("gratitude");

    const loginButton = document.getElementById("loginButton");
    const logoutButton = document.getElementById("logoutButton");
    const userInfo = document.getElementById("userInfo");
    const loginNotice = document.getElementById("loginNotice");

    let currentUser = null;
    let unsubscribeEntries = null;

    // Hier deine erlaubten Google-E-Mail-Adressen eintragen
    const allowedEmails = [
      "joe.martens28@gmail.com",
      "elena.kohlhaas51@gmail.com"
    ];

    function isAllowedUser(user) {
      return user && allowedEmails.includes(user.email);
    }

    loginButton.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        alert("Fehler beim Anmelden: " + error.message);
      }
    });

    logoutButton.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (error) {
        alert("Fehler beim Abmelden: " + error.message);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user && isAllowedUser(user)) {
        currentUser = user;

        loginButton.classList.add("hidden");
        logoutButton.classList.remove("hidden");
        gratitudeForm.classList.remove("hidden");
        loginNotice.classList.add("hidden");

        userInfo.textContent = user.displayName || user.email || "Angemeldet";

        startEntriesListener();

        return;
      }

      if (user && !isAllowedUser(user)) {
        currentUser = null;
        stopEntriesListener();

        loginButton.classList.remove("hidden");
        logoutButton.classList.add("hidden");
        gratitudeForm.classList.add("hidden");
        loginNotice.classList.remove("hidden");

        userInfo.textContent = "Account nicht freigegeben";

        alert("Dieser Google-Account ist für diese Einkaufsliste nicht freigegeben.");

        await signOut(auth);
        return;
      }

      currentUser = null;
      stopEntriesListener();

      loginButton.classList.remove("hidden");
      logoutButton.classList.add("hidden");
      gratitudeForm.classList.add("hidden");
      loginNotice.classList.remove("hidden");

      userInfo.textContent = "Nicht angemeldet";
    });

    function startEntriesListener() {
      if (unsubscribeEntries) return;

      unsubscribeEntries = onValue(
        entriesRef,
        (snapshot) => {
          renderEntries(snapshot.val());
        },
        (error) => {
          console.error("Fehler beim Laden der Einträge:", error);

          entryList.innerHTML = `
            <div class="rounded-2xl border border-rose-400/20 bg-rose-400/10 px-4 py-8 text-center text-sm text-rose-200">
              Fehler beim Laden der Einträge: ${escapeHtml(error.message)}
            </div>
          `;
        }
      );
    }

    function stopEntriesListener() {
      if (unsubscribeEntries) {
        unsubscribeEntries();
        unsubscribeEntries = null;
      }

      renderEntries(null);
    }

    function renderEntries(data) {
      entryList.innerHTML = "";

      if (!data) {
        entryList.innerHTML = `
          <div class="rounded-2xl border border-dashed border-white/15 bg-white/5 px-4 py-8 text-center text-sm text-slate-300">
            Noch keine Einträge vorhanden.
          </div>
        `;
        return;
      }

      const entriesArray = Object.entries(data).reverse();

      entriesArray.forEach(([id, entry]) => {
        const entryDiv = document.createElement("div");

        entryDiv.className =
          "group rounded-2xl border border-white/10 bg-white/10 p-4 shadow-lg backdrop-blur-sm transition hover:bg-white/15 hover:shadow-xl";

        entryDiv.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <p class="break-words text-base font-semibold leading-relaxed text-white sm:text-lg">
                ${escapeHtml(entry.text)}
              </p>

              <div class="mt-3 flex flex-wrap items-center gap-2">
                <span class="inline-flex rounded-full border border-white/10 bg-white/10 px-2.5 py-1 text-xs text-slate-300">
                  ${escapeHtml(entry.date)}
                </span>

                <span class="inline-flex max-w-full rounded-full border border-emerald-400/20 bg-emerald-400/10 px-2.5 py-1 text-xs text-emerald-200">
                  ${escapeHtml(entry.name)}
                </span>
              </div>
            </div>

            <div class="flex shrink-0 items-center gap-2">
              <button
                type="button"
                class="edit inline-flex h-10 w-10 items-center justify-center rounded-xl border border-amber-400/20 bg-amber-400/10 text-lg transition hover:bg-amber-400/20 active:scale-95"
                aria-label="Bearbeiten"
                title="Bearbeiten"
              >
                ✏️
              </button>

              <button
                type="button"
                class="delete inline-flex h-10 w-10 items-center justify-center rounded-xl border border-rose-400/20 bg-rose-400/10 text-lg transition hover:bg-rose-400/20 active:scale-95"
                aria-label="Löschen"
                title="Löschen"
              >
                🗑️
              </button>
            </div>
          </div>
        `;

        entryDiv.querySelector(".delete").addEventListener("click", () => {
          deleteEntry(id);
        });

        entryDiv.querySelector(".edit").addEventListener("click", () => {
          editEntry(id, entry);
        });

        entryList.appendChild(entryDiv);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    gratitudeForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!currentUser) {
        alert("Bitte zuerst mit Google anmelden.");
        return;
      }

      const name = currentUser.displayName || currentUser.email || "Unbekannt";
      const text = gratitudeInput.value.trim();

      if (!text) return;

      try {
        await push(entriesRef, {
          uid: currentUser.uid,
          email: currentUser.email,
          name,
          text,
          date: new Date().toLocaleString("de-DE", {
            dateStyle: "short",
            timeStyle: "short"
          })
        });

        gratitudeInput.value = "";
        gratitudeInput.focus();
      } catch (error) {
        alert("Fehler beim Speichern: " + error.message);
      }
    });

    async function deleteEntry(id) {
      if (!currentUser) {
        alert("Bitte zuerst mit Google anmelden.");
        return;
      }

      const reallyDelete = confirm("Diesen Eintrag wirklich löschen?");
      if (!reallyDelete) return;

      try {
        await remove(ref(db, `entries/${id}`));
      } catch (error) {
        alert("Fehler beim Löschen: " + error.message);
      }
    }

    async function editEntry(id, entry) {
      if (!currentUser) {
        alert("Bitte zuerst mit Google anmelden.");
        return;
      }

      const newText = prompt("Eintrag bearbeiten:", entry.text);
      if (newText === null) return;

      const cleanText = newText.trim();

      if (!cleanText) {
        alert("Der Eintrag darf nicht leer sein.");
        return;
      }

      try {
        await update(ref(db, `entries/${id}`), {
          text: cleanText,
          editedAt: new Date().toLocaleString("de-DE", {
            dateStyle: "short",
            timeStyle: "short"
          })
        });
      } catch (error) {
        alert("Fehler beim Bearbeiten: " + error.message);
      }
    }
  </script>
</body>
</html>
