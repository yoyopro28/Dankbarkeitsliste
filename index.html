<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einkaufsliste</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-white">
  <div class="mx-auto flex min-h-screen w-full max-w-2xl items-start justify-center px-4 py-6 sm:px-6 lg:px-8">
    <div class="w-full">
      <div class="overflow-hidden rounded-3xl border border-white/10 bg-white/10 shadow-2xl backdrop-blur-xl">
        
        <!-- Header -->
        <div class="border-b border-white/10 px-5 py-6 sm:px-8">
          <div class="flex items-center justify-between gap-4">
            <div>
              <p class="mb-2 inline-block rounded-full border border-emerald-400/20 bg-emerald-400/10 px-3 py-1 text-xs font-medium tracking-wide text-emerald-300">
                Gemeinsam organisiert
              </p>
              <h1 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
                Einkaufsliste
              </h1>
              <p class="mt-2 text-sm text-slate-300 sm:text-base">
                Schnell eintragen, bearbeiten und geräteübergreifend aktuell halten.
              </p>
            </div>
          </div>
        </div>

        <!-- List -->
        <div class="px-5 py-5 sm:px-8">
          <div id="entryList" class="space-y-3">
            <div class="rounded-2xl border border-dashed border-white/15 bg-white/5 px-4 py-8 text-center text-sm text-slate-300">
              Noch keine Einträge vorhanden.
            </div>
          </div>
        </div>

        <!-- Form -->
        <div class="border-t border-white/10 bg-black/10 px-5 py-5 sm:px-8">
          <form id="gratitudeForm" class="space-y-4">
            <div>
              <label for="name" class="mb-2 block text-sm font-medium text-slate-200">
                Dein Name
              </label>
              <input
                type="text"
                id="name"
                placeholder="z. B. Joe"
                required
                class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-white placeholder:text-slate-400 outline-none transition focus:border-emerald-400/50 focus:bg-white/15 focus:ring-4 focus:ring-emerald-400/10"
              />
            </div>

            <div>
              <label for="gratitude" class="mb-2 block text-sm font-medium text-slate-200">
                Was brauchen wir?
              </label>
              <input
                type="text"
                id="gratitude"
                placeholder="z. B. Hafermilch, Tomaten, Reis ..."
                required
                class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-white placeholder:text-slate-400 outline-none transition focus:border-emerald-400/50 focus:bg-white/15 focus:ring-4 focus:ring-emerald-400/10"
              />
            </div>

            <button
              type="submit"
              class="inline-flex w-full items-center justify-center rounded-2xl bg-emerald-500 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-emerald-900/30 transition hover:bg-emerald-400 active:scale-[0.99] sm:text-base"
            >
              Hinzufügen
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onValue,
      remove,
      update
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWzDVcfiMG64EQxxSrHu1ORp0zwDbUYdQ",
      authDomain: "einkaufsliste-1c079.firebaseapp.com",
      databaseURL: "https://einkaufsliste-1c079-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "einkaufsliste-1c079",
      storageBucket: "einkaufsliste-1c079.firebasestorage.app",
      messagingSenderId: "23304432903",
      appId: "1:23304432903:web:4f9ab844cc034b94b169a2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const entriesRef = ref(db, "entries");

    const entryList = document.getElementById("entryList");
    const gratitudeForm = document.getElementById("gratitudeForm");
    const nameInput = document.getElementById("name");
    const gratitudeInput = document.getElementById("gratitude");

    function renderEntries(data) {
      entryList.innerHTML = "";

      if (!data) {
        entryList.innerHTML = `
          <div class="rounded-2xl border border-dashed border-white/15 bg-white/5 px-4 py-8 text-center text-sm text-slate-300">
            Noch keine Einträge vorhanden.
          </div>
        `;
        return;
      }

      const entriesArray = Object.entries(data).reverse();

      entriesArray.forEach(([id, entry]) => {
        const entryDiv = document.createElement("div");
        entryDiv.className =
          "group rounded-2xl border border-white/10 bg-white/10 p-4 shadow-lg backdrop-blur-sm transition hover:bg-white/15 hover:shadow-xl";

        entryDiv.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <div class="flex flex-wrap items-center gap-2">
                <strong class="truncate text-base font-semibold text-white">${escapeHtml(entry.name)}</strong>
                <span class="rounded-full border border-white/10 bg-white/10 px-2.5 py-1 text-xs text-slate-300">
                  ${escapeHtml(entry.date)}
                </span>
              </div>
              <p class="mt-3 break-words text-sm leading-relaxed text-slate-100 sm:text-base">
                ${escapeHtml(entry.text)}
              </p>
            </div>

            <div class="flex shrink-0 items-center gap-2">
              <button
                type="button"
                class="edit inline-flex h-10 w-10 items-center justify-center rounded-xl border border-amber-400/20 bg-amber-400/10 text-lg transition hover:bg-amber-400/20 active:scale-95"
                aria-label="Bearbeiten"
                title="Bearbeiten"
              >
                ✏️
              </button>
              <button
                type="button"
                class="delete inline-flex h-10 w-10 items-center justify-center rounded-xl border border-rose-400/20 bg-rose-400/10 text-lg transition hover:bg-rose-400/20 active:scale-95"
                aria-label="Löschen"
                title="Löschen"
              >
                🗑️
              </button>
            </div>
          </div>
        `;

        entryDiv.querySelector(".delete").addEventListener("click", () => {
          deleteEntry(id);
        });

        entryDiv.querySelector(".edit").addEventListener("click", () => {
          editEntry(id, entry);
        });

        entryList.appendChild(entryDiv);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    onValue(entriesRef, (snapshot) => {
      renderEntries(snapshot.val());
    });

    gratitudeForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const text = gratitudeInput.value.trim();

      if (!name || !text) return;

      try {
        await push(entriesRef, {
          name,
          text,
          date: new Date().toLocaleString("de-DE", {
            dateStyle: "short",
            timeStyle: "short"
          })
        });

        gratitudeForm.reset();
        gratitudeInput.focus();
      } catch (error) {
        alert("Fehler beim Speichern: " + error.message);
      }
    });

    async function deleteEntry(id) {
      try {
        await remove(ref(db, `entries/${id}`));
      } catch (error) {
        alert("Fehler beim Löschen: " + error.message);
      }
    }

    async function editEntry(id, entry) {
      const newName = prompt("Name bearbeiten:", entry.name);
      if (newName === null) return;

      const newText = prompt("Eintrag bearbeiten:", entry.text);
      if (newText === null) return;

      const cleanName = newName.trim();
      const cleanText = newText.trim();

      if (!cleanName || !cleanText) {
        alert("Name und Eintrag dürfen nicht leer sein.");
        return;
      }

      try {
        await update(ref(db, `entries/${id}`), {
          name: cleanName,
          text: cleanText
        });
      } catch (error) {
        alert("Fehler beim Bearbeiten: " + error.message);
      }
    }
  </script>
</body>
</html>
